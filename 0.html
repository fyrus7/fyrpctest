/* QR Scanner Modal */
.modal {
  display: none;
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100dvh !important;
  margin: 0 !important;
  padding: 0 !important;
  overflow: hidden;
  background: #000;
  z-index: 10000;
  text-align: left;
}

.modal-content {
  position: relative;
  width: 100vw;
  height: 100dvh;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #000;
}

.modal-body {
  width: 100%;
  height: 100%;
  padding-bottom: 100px;
  margin: 0;
  text-align: center;
  overflow: hidden;
}

#reader {
  width: 100vw !important;
  max-width: 100vw !important;
  margin: 0 !important;
  padding: 0 !important;
}

#reader video {
  width: 100vw !important;
  height: calc(100dvh - 60px) !important;
  object-fit: cover !important;
}

.back-button {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: #fff;
  font-size: 18px;
  padding-bottom: 10px;
  z-index: 10001;
}

.torchToggle {
  position: absolute;
  bottom: 150px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10001;
  display: none;
  width: 150px;
  height: 45px;
  cursor: pointer;
  background-color: transparent;
  color: white;
  border: none;
  border-radius: 5px;
}

        /* ===== HOLD MODAL ===== */
        .hold-modal {
          display: none;
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0.15); /* ringan, bukan hitam */
          z-index: 9999;
          justify-content: center;
          align-items: flex-start; /* modal turun sikit dari top */
          padding-top: 80px; /* jarak dari atas */
        }

        .hold-modal-box {
          position: relative; /* untuk X button */
          background: #ffffff;
          width: 92%;
          max-width: 420px;
          border-radius: 14px;
          box-shadow: 0 10px 30px rgba(0,0,0,0.25);
          padding: 16px;
          color: #222;
          margin: 0 10px; /* padding kiri kanan untuk mobile */
          box-sizing: border-box;
        }

        /* ===== HEADER ===== */
        .hold-modal-header {
          font-size: 16px;
          font-weight: 600;
          margin-bottom: 12px;
          text-align: center;
          color: #263238;
        }

        /* ===== GRID DISPLAY ===== */
        .hold-grid {
          display: flex;
          flex-direction: column; /* baris ke bawah */
          gap: 8px;
          max-height: 50vh;
          overflow-y: auto;
        }

        /* Setiap item dalam grid */
        .hold-item {
          display: block; /* ❗ buang grid */
          padding: 10px 12px;
          border-radius: 8px;
          background: #f7f7f7;
          border: 1px solid #e0e0e0;
        }

        .hold-row {
          display: flex;
          justify-content: space-between;
          gap: 16px;
        }

        /* ===== ITEM TEXT ===== */
        .hold-name {
          font-size: 14px;
          color: #444;
          margin-bottom: 6px;
          text-align: left;
        }

        .hold-bib {
          font-size: 16px;
          font-weight: 700;
          color: #000;
        }

        .hold-size {
          font-size: 14px;
          color: #555;
          font-weight: 500;
        }

        /* ===== ACTION BUTTONS ===== */
        .hold-modal-actions {
          display: flex;
          justify-content: space-between;
          margin-top: 16px;
          gap: 10px; /* gap antara button */
        }

        .btn-cancel {
          flex: 1;
          background: #f1f3f5;   /* light neutral */
          color: #555;
          border: none;
          border-radius: 20px;
          padding: 10px 0;
          font-weight: 500;
          cursor: pointer;
          transition: all 0.2s ease;
        }
        .btn-collect {
          flex: 1;
          background: linear-gradient(135deg, #6f42c1, #e83e8c);
          color: #fff;
          border: none;
          border-radius: 20px;
          padding: 10px 0;
          font-weight: 600;
          cursor: pointer;
          box-shadow: 0 4px 10px rgba(0,0,0,0.15);
          transition: all 0.2s ease;
        }
        .btn-cancel:hover,
        .btn-collect:hover {
          opacity: 0.9;
        }

        /* ===== CLOSE BUTTON ===== */
        .hold-modal-close {
          position: absolute;
          top: 8px;
          right: 10px;
          font-size: 20px;
          background: transparent;
          border: none;
          color: #555;
          cursor: pointer;
          font-weight: bold;
        }
        .hold-modal-close:hover {
          color: #000;
        }



        /* ===== WALKIN BOX (IMPROVED) ===== */
        .walkin-box {
          position: fixed;
          top: 10%;
          left: 50%;
          transform: translateX(-50%);
          width: 300px;
          max-width: 92%;
          background: #ffffff;
          border: none;
          border-radius: 16px;
          padding: 16px;
          box-shadow: 0 10px 30px rgba(0,0,0,0.25);
          display: none;
          z-index: 1000;
          text-align: center;
        }

        /* Title */
        .walkin-box h3 {
          margin-top: 0;
          margin-bottom: 15px;
          font-weight: 700;
          font-size: 18px;
        }

        /* Close button */
        .walkin-box .close {
          position: absolute;
          right: 12px;
          top: 10px;
          font-size: 20px;
          cursor: pointer;
        }

        /* Inputs */
        .walkin-box input {
          width: 90%;
          margin: 5px auto;

          padding: 7px;
          border-radius: 8px;

          border: 1px solid #ddd;

          text-align: center;
          font-size: 13px;
        }

        /* Bib + Chip row */
        .bib-chip-row {
          display: flex;
          justify-content: center;
          gap: 6px; /* tambah sikit spacing */
          margin-top: 5px;
        }

        .bib-chip-row input {
          width: 120px; /* kecil sikit */
        }

        /* Radio section */
        .walkin-box label {
          font-size: 14px;
        }

        /* Buttons */
        .walkin-box button {
          padding: 8px 14px;
          font-size: 13px;
          border: none;
          border-radius: 20px;
          cursor: pointer;
          transition: all 0.2s ease;
        }

        /* Button row */
        .walkin-box .btn-row {
          display: flex;
          justify-content: center;
          gap: 10px;
          margin-top: 10px;
        }

        /* QR image */
        #walkinQR {
          width: 180px;   /* kecilkan sikit */
          margin: 10px auto;
        }

        /* Loader */
        #walkinLoader {
          margin-top: 15px;
        }

        #walkinSubmitBtn {
          background: linear-gradient(135deg, #6f42c1, #e83e8c);
          color: white;
        }
        .walkin-box .btn-row button:last-child {
          background: #eee;
          color: #333;
        }
        .walkin-box button:hover {
          opacity: 0.9;
        }

<script>

    function cleanApiBase() {
      return String(WORKER_API || "").replace(/\/+$/, "");
    }

    async function apiJson(path, options = {}) {
      const res = await fetch(`${cleanApiBase()}${path}`, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {})
        }
      });

      const raw = await res.text();

      let data;

      try {
        data = JSON.parse(raw);
      } catch (e) {
        throw new Error(raw || `HTTP ${res.status}`);
      }

      if (!res.ok) {
        throw new Error(JSON.stringify(data));
      }

      return data;
    }

    function showLoader() {
      const spinner = document.getElementById("globalSpinner");

      if (spinner) {
        spinner.style.display = "flex";
      }

      blockUI(true);
    }

    function hideLoader() {
      const spinner = document.getElementById("globalSpinner");

      if (spinner) {
        spinner.style.display = "none";
      }

      blockUI(false);
    }

    function blockUI(state) {
      const blocker = document.getElementById("uiBlocker");

      if (blocker) {
        blocker.style.display = state ? "block" : "none";
      }
    }

    function setAllButtonsDisabled(state) {
      document
        .querySelectorAll("button, input[type=button]")
        .forEach(btn => {
          btn.disabled = state;
        });
    }

    function isMobileDevice() {
      const ua = navigator.userAgent || navigator.vendor || window.opera || "";

      return (
        /android|iphone|ipad|ipod|iemobile|opera mini|mobile/i.test(ua) ||
        window.innerWidth <= 768 ||
        window.matchMedia("(pointer: coarse)").matches
      );
    }


    function requireLogin() {
      const token = localStorage.getItem("sessionToken");
      const profile = localStorage.getItem("userProfile");

      if (!token || !profile) {
        window.location.replace("index.html");
        return false;
      }

      document.getElementById("userProfile").textContent =
        profile.toUpperCase();

      apiJson("/validate", {
        method: "POST",
        body: JSON.stringify({ token })
      })
        .then(response => {
          if (!response.valid) {
            localStorage.clear();
            window.location.replace("index.html");
          }
        })
        .catch(err => {
          console.log("VALIDATE ERROR:", err);
        });

      return true;
    }


    function handleLogoutClick() {
      const role = (localStorage.getItem("userProfile") || "").toLowerCase();

      if (role === "admin" || role === "mod") {
        openLogoutMenu();
      } else {
        logout();
      }
    }

    function openLogoutMenu() {
      const menu = document.getElementById("logoutMenu");

      if (!menu) return;

      menu.style.display =
        menu.style.display === "block" ? "none" : "block";
    }

    document.addEventListener("click", event => {
      const menu = document.getElementById("logoutMenu");
      const btn = document.getElementById("logoutBtn");

      if (!menu || !btn) return;

      if (!menu.contains(event.target) && !btn.contains(event.target)) {
        menu.style.display = "none";
      }
    });


    function goMonitor() {
      const btn = document.getElementById("monitorBtn");
      const logoutBtn = document.getElementById("logoutMenuBtn");

      if (btn?.dataset.loading) return;

      btn.dataset.loading = "true";

      [btn, logoutBtn].forEach(el => {
        if (el) {
          el.style.pointerEvents = "none";
          el.style.opacity = "0.6";
        }
      });

      btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i>';

      window.location.href = "monitor.html";
    }

    function goAdmin() {
      const btn = document.getElementById("adminBtn");
      const logoutBtn = document.getElementById("logoutMenuBtn");

      if (btn?.dataset.loading) return;

      btn.dataset.loading = "true";

      [btn, logoutBtn].forEach(el => {
        if (el) {
          el.style.pointerEvents = "none";
          el.style.opacity = "0.6";
        }
      });

      btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i>';

      window.location.href = "admin.html";
    }

    
    async function logout() {
      setAllButtonsDisabled(true);

      const logoutBtn = document.getElementById("logoutBtn");

      if (logoutBtn && logoutBtn.offsetParent !== null) {
        logoutBtn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i>';
      }

      const token = localStorage.getItem("sessionToken");

      try {
        if (token) {
          await apiJson("/logout", {
            method: "POST",
            body: JSON.stringify({ token })
          });
        }

      } catch (err) {
        console.log("LOGOUT ERROR:", err);

      } finally {
        localStorage.clear();
        window.location.replace("index.html");
      }
    }

function logoutFromMenu() {
  const btn = document.getElementById("logoutMenuBtn");
  const adminBtn = document.getElementById("adminBtn");
  const monitorBtn = document.getElementById("monitorBtn");

  [adminBtn, monitorBtn, btn].forEach(el => {
    if (el) {
      el.style.pointerEvents = "none";
      el.style.opacity = "0.6";
    }
  });

  if (btn) {
    btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i>';
  }

  // 🔥 force render frame sebelum logout jalan
  setTimeout(() => {
    logout();
  }, 50);
}

</script>


<script>
window.html5QrCode = window.html5QrCode || undefined;
window.torchEnabled = window.torchEnabled || false;
window.beepSound = window.beepSound || new Audio('Sound/media_QRScan.mp3');

// Function to open the scanner modal
async function openScannerModal() {

  // reset scan session
  scannedSet.clear();
  lastScanned = "";
  lastScanTime = 0;

  resetTorchState();

  document.getElementById("qrScannerModal").style.display = "block";
  document.getElementById('footer').classList.add('hide-footer');

  // optional safety stop
  if (html5QrCode && html5QrCode._isScanning) {
    await html5QrCode.stop().catch(() => {});
  }

  startScanner();
}


// Helper: safe set display - new QR code
function setDisplay(id, value) {
  const el = document.getElementById(id);
  if (el && el.style) el.style.display = value;
}

// Helper: safe set text/html
function setText(id, text, isHTML = false) {
  const el = document.getElementById(id);
  if (!el) return;
  if (isHTML) el.innerHTML = text;
  else el.textContent = text;
}

var lastScanned = "";
var lastScanTime = 0;
var scannedSet = new Set();

// Function to start the scanner
async function startScanner() {
  // Block kalau bukan mobile
  if (!/Mobi|Android/i.test(navigator.userAgent)) {
    setText('errorMessage', 'QR Scanner function only works on<br>Smartphone with a back camera.', true);
    setDisplay('errorMessage', 'block');
    return;
  }

  // Reset error message
  setDisplay('errorMessage', 'none');
  setText('errorMessage', '');

  if (!html5QrCode) {
    html5QrCode = new Html5Qrcode("reader");
  }

  setDisplay('reader', 'block');

  // Start the scanner
  html5QrCode.start(
    { facingMode: { exact: "environment" } },
    { fps: 10, qrbox: { width: 300, height: 300 } },
(decodedText) => {

  const now = Date.now();

  // anti spam frame
  if (decodedText === lastScanned && (now - lastScanTime < 1500)) {
    return;
  }

  lastScanned = decodedText;
  lastScanTime = now;

  const input = document.getElementById("searchTerm");
  if (!input) return;

  const current = input.value.trim();

  let list = current
    ? current.split(",").map(v => v.trim()).filter(v => v)
    : [];

  if (scannedSet.has(decodedText)) {
    return;
  }

  scannedSet.add(decodedText);

  beepSound?.play();
  navigator.vibrate?.(100);

  list.push(decodedText);

  const newValue = list.join(", ");
  input.value = newValue;

  search(newValue);

  // 🔥 CLOSE SCANNER SELEPAS SCAN
  stopScanner();
  closeModal();
},
    (errorMessage) => {
      console.log(errorMessage);
    }
  ).then(() => {
    if (isTorchSupported(html5QrCode)) {
      setDisplay('torchButton', 'inline-block');
    }
  }).catch(err => {
    console.error("Unable to start scanning", err);
    setText('errorMessage', 'QR Scanner function only works on<br>Smartphone with a back camera.', true);
    setDisplay('errorMessage', 'block');
    resetUI?.();
    stopScanner?.();
  });
}



// Function to close the modal
function closeModal() {
  setDisplay("qrScannerModal", "none");
  document.getElementById('footer')?.classList.remove('hide-footer');
  stopScanner();
}

// Check if torch is supported
function isTorchSupported(html5QrCode) {
  const settings = html5QrCode.getRunningTrackSettings();
  return "torch" in settings;
}

// Toggle torch on/off
async function toggleTorch() {
  try {
    if (!torchEnabled) {
      await html5QrCode.applyVideoConstraints({ advanced: [{ torch: true }] });
      torchEnabled = true;
      setText('torchButton', '<i class="bi bi-lightbulb" style="font-size: 30px;"></i><br>Torch is On', true);
    } else {
      await html5QrCode.applyVideoConstraints({ advanced: [{ torch: false }] });
      torchEnabled = false;
      setText('torchButton', '<i class="bi bi-lightbulb-off" style="font-size: 30px;"></i><br>Torch is Off', true);
    }
  } catch (err) {
    console.error("Failed to toggle torch", err);
  }
}

function stopScanner() {
  if (html5QrCode) {
    html5QrCode.stop().then(() => {
      resetReader();
      resetUI();
      resetTorchState();
    }).catch(err => {
      console.error("Unable to stop scanning", err);
      resetReader();
      resetUI();
      resetTorchState();
    });
  } else {
    resetReader();
    resetUI();
  }
}

function resetReader() {
  setDisplay('reader', 'none');
  if (html5QrCode) {
    html5QrCode.clear();
  }
}

// Reset the torch state and button
function resetTorchState() {
  torchEnabled = false;
  setText('torchButton', '<i class="bi bi-lightbulb-off" style="font-size: 30px;"></i><br>Torch is Off', true);
  setDisplay('torchButton', 'none');
}

function resetUI() {
  resetReader();
}
