html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}
.desktop-container {
  display: flex;
  height: 100vh;
}

.left-panel {
  width: 400px;
  background-color: #E8ECEF;
  padding: 10px 20px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;  /* susun menegak */
  height: 100vh;           /* penuh ketinggian skrin */
}

/* ===== HOLD MODAL ===== */
.hold-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.15); /* ringan, bukan hitam */
  z-index: 9999;
  justify-content: center;
  align-items: flex-start; /* modal turun sikit dari top */
  padding-top: 80px; /* jarak dari atas */
}

.hold-modal-box {
  position: relative; /* untuk X button */
  background: #ffffff;
  width: 92%;
  max-width: 420px;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  padding: 16px;
  color: #222;
  margin: 0 10px; /* padding kiri kanan untuk mobile */
  box-sizing: border-box;
}

/* Optional responsive tweak */
@media screen and (max-width: 480px) {
  .hold-modal-box {
    width: auto; /* biar penuh lebar minus margin */
    margin: 0 16px; /* jarak kiri kanan di mobile */
  }
}

/* ===== HEADER ===== */
.hold-modal-header {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 12px;
  text-align: center;
  color: #263238;
}

/* ===== GRID DISPLAY ===== */
.hold-grid {
  display: flex;
  flex-direction: column; /* baris ke bawah */
  gap: 8px;
  max-height: 50vh;
  overflow-y: auto;
}

/* Setiap item dalam grid */
.hold-item {
  display: block; /* ❗ buang grid */
  padding: 10px 12px;
  border-radius: 8px;
  background: #f7f7f7;
  border: 1px solid #e0e0e0;
}

.hold-row {
  display: flex;
  justify-content: space-between;
  gap: 16px;
}

/* ===== ITEM TEXT ===== */
.hold-name {
  font-size: 14px;
  color: #444;
  margin-bottom: 6px;
  text-align: left;
}

.hold-bib {
  font-size: 16px;
  font-weight: 700;
  color: #000;
}

.hold-size {
  font-size: 14px;
  color: #555;
  font-weight: 500;
}

/* ===== ACTION BUTTONS ===== */
.hold-modal-actions {
  display: flex;
  justify-content: space-between;
  margin-top: 16px;
  gap: 10px; /* gap antara button */
}

.btn-cancel {
  flex: 1;
  background: #B0BEC5;
  border: none;
  padding: 10px 0;
  border-radius: 6px;
  color: #000;
  font-weight: 500;
  cursor: pointer;
}

.btn-collect {
  flex: 1;
  background: #4CAF50;
  border: none;
  padding: 10px 0;
  border-radius: 6px;
  color: #fff;
  font-weight: 500;
  cursor: pointer;
}

/* Optional hover effect */
.btn-cancel:hover {
  background: #90A4AE;
}

.btn-collect:hover {
  background: #43A047;
}

/* ===== CLOSE BUTTON ===== */
.hold-modal-close {
  position: absolute;
  top: 8px;
  right: 10px;
  font-size: 20px;
  background: transparent;
  border: none;
  color: #555;
  cursor: pointer;
  font-weight: bold;
}
.hold-modal-close:hover {
  color: #000;
}

  <script>
  function setView(mode) {
  const box = document.querySelector(".result-box");
  const listBtn = document.getElementById("listViewBtn");
  const gridBtn = document.getElementById("gridViewBtn");

  if (!box) return;

  box.classList.remove("list-view", "grid-view");

  if (mode === "grid") {
    box.classList.add("grid-view");
    gridBtn.classList.add("active");
    listBtn.classList.remove("active");
  } else {
    box.classList.add("list-view");
    listBtn.classList.add("active");
    gridBtn.classList.remove("active");
  }

  localStorage.setItem("viewMode", mode);
}

document.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem("viewMode") || "list";
  setView(saved);
});


    function cleanApiBase() {
      return String(WORKER_API || "").replace(/\/+$/, "");
    }

    async function apiJson(path, options = {}) {
      const res = await fetch(`${cleanApiBase()}${path}`, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {})
        }
      });

      const raw = await res.text();

      let data;

      try {
        data = JSON.parse(raw);
      } catch (e) {
        throw new Error(raw || `HTTP ${res.status}`);
      }

      if (!res.ok) {
        throw new Error(JSON.stringify(data));
      }

      return data;
    }

    function showLoader() {
      const spinner = document.getElementById("globalSpinner");

      if (spinner) {
        spinner.style.display = "flex";
      }

      blockUI(true);
    }

    function hideLoader() {
      const spinner = document.getElementById("globalSpinner");

      if (spinner) {
        spinner.style.display = "none";
      }

      blockUI(false);
    }

    function blockUI(state) {
      const blocker = document.getElementById("uiBlocker");

      if (blocker) {
        blocker.style.display = state ? "block" : "none";
      }
    }

    function setAllButtonsDisabled(state) {
      document
        .querySelectorAll("button, input[type=button]")
        .forEach(btn => {
          btn.disabled = state;
        });
    }

    function isMobileDevice() {
      const ua = navigator.userAgent || navigator.vendor || window.opera || "";

      return (
        /android|iphone|ipad|ipod|iemobile|opera mini|mobile/i.test(ua) ||
        window.innerWidth <= 768 ||
        window.matchMedia("(pointer: coarse)").matches
      );
    }


    function requireLogin() {
      const token = localStorage.getItem("sessionToken");
      const profile = localStorage.getItem("userProfile");

      if (!token || !profile) {
        window.location.replace("index.html");
        return false;
      }

      document.getElementById("userProfile").textContent =
        profile.toUpperCase();

      apiJson("/validate", {
        method: "POST",
        body: JSON.stringify({ token })
      })
        .then(response => {
          if (!response.valid) {
            localStorage.clear();
            window.location.replace("index.html");
          }
        })
        .catch(err => {
          console.log("VALIDATE ERROR:", err);
        });

      return true;
    }


    function handleLogoutClick() {
      const role = (localStorage.getItem("userProfile") || "").toLowerCase();

      if (role === "admin" || role === "mod") {
        openLogoutMenu();
      } else {
        logout();
      }
    }

    function openLogoutMenu() {
      const menu = document.getElementById("logoutMenu");

      if (!menu) return;

      menu.style.display =
        menu.style.display === "block" ? "none" : "block";
    }

    document.addEventListener("click", event => {
      const menu = document.getElementById("logoutMenu");
      const btn = document.getElementById("logoutBtn");

      if (!menu || !btn) return;

      if (!menu.contains(event.target) && !btn.contains(event.target)) {
        menu.style.display = "none";
      }
    });


    function goMonitor() {
      const btn = document.getElementById("monitorBtn");
      const logoutBtn = document.getElementById("logoutMenuBtn");

      if (btn?.dataset.loading) return;

      btn.dataset.loading = "true";

      [btn, logoutBtn].forEach(el => {
        if (el) {
          el.style.pointerEvents = "none";
          el.style.opacity = "0.6";
        }
      });

      btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i>';

      window.location.href = "monitor.html";
    }

    function goAdmin() {
      const btn = document.getElementById("adminBtn");
      const logoutBtn = document.getElementById("logoutMenuBtn");

      if (btn?.dataset.loading) return;

      btn.dataset.loading = "true";

      [btn, logoutBtn].forEach(el => {
        if (el) {
          el.style.pointerEvents = "none";
          el.style.opacity = "0.6";
        }
      });

      btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i>';

      window.location.href = "admin.html";
    }

    
    async function logout() {
      setAllButtonsDisabled(true);

      const logoutBtn = document.getElementById("logoutBtn");

      if (logoutBtn && logoutBtn.offsetParent !== null) {
        logoutBtn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i>';
      }

      const token = localStorage.getItem("sessionToken");

      try {
        if (token) {
          await apiJson("/logout", {
            method: "POST",
            body: JSON.stringify({ token })
          });
        }

      } catch (err) {
        console.log("LOGOUT ERROR:", err);

      } finally {
        localStorage.clear();
        window.location.replace("index.html");
      }
    }
